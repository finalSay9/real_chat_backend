

services:

  postgres:
    image: postgres:16
    container_name: fastapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fastapi
      POSTGRES_PASSWORD: fastapi123
      POSTGRES_DB: fastapi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: fastapi_backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://fastapi:fastapi123@postgres:5432/fastapi_db

volumes:
  postgres_data: